<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IAB207 Assignment 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
</head>

<body>
    <!-- Header -->
    <header>

        <!-- Navbar -->
        <nav>
            <!--  Navbar  -->
        <nav class="navbar iz-navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index')}}">INDIE<span>—</span>ZONE</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
            <i class="bi bi-list" style="color:var(--text-secondary);font-size:1.5rem;"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav me-auto ms-4 gap-1">
                <li class="nav-item"><a class="nav-link active" href="{{ url_for('main.index')}}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.events')}}">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('main.booking_history')}}">My Bookings</a></li>
            </ul>
            <div class="d-flex gap-2 mt-3 mt-lg-0">
                <a class="btn-outline-neon btn">Log In</a>
                <a class="btn-neon btn">Join Free</a>
            </div>
            </div>
        </div>
        </nav>
        <!-- Code for using Flask flash -->
        <div class="container-fluid">
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-warning">
                <button type="button" class="close" data-dismiss="alert" aria-label="close">x</button>
                {{message}}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>
        {% block header %}

        {% endblock %}

    </header>

    {% block body %}

    {% endblock %}

    <footer class="footer">
        <!-- Your footer should go here -->
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>

</html>
